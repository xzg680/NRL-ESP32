[platformio]
src_dir = src
default_envs = gezipai, bh4tdv
; Source files are selected in src/CMakeLists.txt.

; ============================================================
; Pure ESP-IDF build (Arduino framework dropped in Phase 4 of
; the migration; see plans/vast-munching-newell.md).
;   gezipai -> 格子派      (ESP32-S3-N16R8 + ST7789 LCD + ES7210 mic ADC)
;   bh4tdv  -> BH4TDV 3188 NRL (ESP32-S3, no LCD/ES7210)
;   s31_korvo -> ESP32-S31-Korvo-1 (RGB LCD, ES8389 audio)
; Build both:  pio run        Build one:  pio run -e gezipai
; ============================================================

[env]
; Official PlatformIO espressif32 7.0.1 provides ESP-IDF v6.0.1 for
; framework = espidf builds. gezipai/bh4tdv build fine on this.
;
; NOTE: do NOT put a machine-local `platform_packages = framework-espidf @
; symlink://C:/esp/esp-idf` here. This section is inherited by every env, so a
; local symlink would break gezipai/bh4tdv in CI (the path does not exist on the
; Linux runner). ESP32-S31 needs IDF 6.1+; that local override lives only under
; [env:s31_korvo], which is not in default_envs and is not built in CI.
platform = espressif32 @ 7.0.1

framework = espidf
monitor_speed = 115200
board_build.partitions = part.csv
board_build.app_partition = app0
upload_protocol = esptool
upload_speed = 921600
extra_scripts =
    scripts/generate_wifi_portal_html.py
    pre:scripts/fix_size_per_env.py
    pre:scripts/ensure_idf_component.py
build_flags =
    -fextended-identifiers
    -finput-charset=UTF-8
    -fexec-charset=UTF-8
    -Isrc/app
    -Isrc/app/driver
    -Isrc/lib

[env:gezipai]
; 格子派 = ESP32-S3-N16R8: 16 MB flash + 8 MB octal PSRAM.
; AFE is compiled in for AI processing. Gezipai has a second ES7210 input
; wired as the AEC reference channel, so its build exposes/enables AEC.
board = nrl_gezipai_esp32s3_n16r8
board_build.partitions = part-gezipai.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
custom_component_remove =
    espressif/esp_insights
    espressif/esp_rainmaker
; LVGL is vendored at components/lvgl/ (NOT managed_components/ - that
; directory is owned by the IDF component manager and any unknown entries
; there are pruned on reconfigure). The script auto-downloads on first build
; with progress + 60s socket timeout; on failure it prints a manual-fallback
; URL and exits non-zero so the build doesn't silently hang. Skip auto-fetch
; with LVGL_SKIP_FETCH=1 once you have placed the directory yourself.
extra_scripts =
    ${env.extra_scripts}
    scripts/fix_s31_toolchain.py
    pre:scripts/fetch_lvgl.py
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_GEZIPAI
    -DNRL_ENABLE_AUDIO_AFE=1
    -DNRL_ENABLE_AEC=1

[env:bh4tdv]
board = nrl_bh4tdv_esp32s3
board_build.partitions = part-bh4tdv.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
custom_component_remove =
    espressif/esp_insights
    espressif/esp_rainmaker
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_BH4TDV
    -DNRL_ENABLE_AUDIO_AFE=1
    -DNRL_ENABLE_AEC=1

[env:s31_korvo]
board = nrl_esp32_s31_korvo_1
platform_packages =
    framework-espidf @ symlink://C:/esp/esp-idf
board_build.partitions = part-gezipai.csv
board_build.flash_size = 16MB
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.cmake_extra_args =
    -DNRL_EXTRA_COMPONENT_DIRS=vendor/esp32_s31_korvo
board_upload.flash_size = 16MB
custom_component_remove =
    espressif/esp_insights
    espressif/esp_rainmaker
extra_scripts =
    ${env.extra_scripts}
    pre:scripts/fetch_lvgl.py
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_S31_KORVO
    -DNRL_ENABLE_AUDIO_AFE=1
    -DNRL_ENABLE_AEC=1
