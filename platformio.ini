[platformio]
src_dir = src
default_envs = gezipai, bh4tdv

; ============================================================
; Two board variants share the [env] section below; each
; [env:*] only adds its own -DNRL_BOARD switch.
;   gezipai -> 格子派      (ESP32-S3-N16R8, Arduino-as-IDF-component)
;   bh4tdv  -> BH4TDV 3188 NRL (pure Arduino)
; Build both:  pio run        Build one:  pio run -e gezipai
; ============================================================

[common]
build_src_filter =
    -<*>
    +<app/main.cpp>
    +<app/driver/eeprom.cpp>
    +<app/driver/es7210.cpp>
    +<app/driver/es8311.cpp>
    +<app/driver/external_radio.cpp>
    +<app/driver/i2c.cpp>
    +<app/driver/sci_serial.cpp>
    +<app/driver/status_io.cpp>
    +<lib/nrl_at_commands.cpp>
    +<lib/nrl_audio_bridge.cpp>
    +<lib/ble_config.cpp>
    +<lib/wifi_config_portal.cpp>

[env]
; pioarduino fork: arduino-esp32 3.2.1 on ESP-IDF 5.4.2. The official
; espressif32 platform is stuck on IDF 4.4, which is too old for esp-sr.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip

board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
board_build.partitions = part.csv
board_build.app_partition = app0
upload_protocol = esptool
upload_speed = 921600
extra_scripts =
    scripts/generate_wifi_portal_html.py
    scripts/fix_size_per_env.py
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -fextended-identifiers
    -finput-charset=UTF-8
    -fexec-charset=UTF-8
    -Isrc/app
    -Isrc/app/driver
    -Isrc/lib

[env:gezipai]
; 格子派 = ESP32-S3-N16R8: 16 MB flash + 8 MB octal PSRAM.
; Arduino runs as an ESP-IDF component (framework = arduino, espidf) so the
; esp-sr / AFE acoustic echo canceller can be linked. This build is driven by
; the IDF CMake project (CMakeLists.txt + src/CMakeLists.txt + sdkconfig*).
; AEC is always compiled in and toggled at runtime via AT+AEC / the web portal
; (persisted in the device config; see EXTERNAL_RADIO aec_enabled).
board = esp32-s3-devkitc1-n16r8
framework = arduino, espidf
board_build.partitions = part-gezipai.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
custom_component_remove =
    espressif/esp_insights
    espressif/esp_rainmaker
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_GEZIPAI
    -DBOARD_HAS_PSRAM
    -DNRL_ENABLE_GEZIPAI_AEC=1
; Drop src/lib from the include path: the project header src/lib/wifi.h
; collides (case-insensitively, on Windows) with the Arduino framework's
; <WiFi.h>, so Arduino libraries (DNSServer, ...) must not see src/lib.
build_unflags =
    -Isrc/lib
lib_ignore =
    AsyncUDP
    BLE
    DNSServer
    FS
    HTTPClient
    Network
    NetworkClientSecure
    Update
    WebServer
    WiFi

[env:bh4tdv]
build_src_filter =
    ${common.build_src_filter}
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_BH4TDV
