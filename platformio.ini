[platformio]
src_dir = src
default_envs = gezipai, bh4tdv

; ============================================================
; Two board variants share the [env] section below; each
; [env:*] only adds its own -DNRL_BOARD switch.
;   gezipai -> 格子派
;   bh4tdv  -> BH4TDV 3188 NRL
; Build both:  pio run        Build one:  pio run -e gezipai
; ============================================================

[env]
platform = espressif32
platform_packages =
    platformio/tool-esptoolpy@2.41100.0

board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
board_build.partitions = part.csv
board_build.app_partition = app0
upload_protocol = esptool
upload_speed = 921600
extra_scripts =
    scripts/generate_wifi_portal_html.py
    scripts/fix_size_per_env.py
build_src_filter =
    -<*>
    +<app/main.cpp>
    +<app/driver/eeprom.cpp>
    +<app/driver/es7210.cpp>
    +<app/driver/es8311.cpp>
    +<app/driver/external_radio.cpp>
    +<app/driver/i2c.cpp>
    +<app/driver/sci_serial.cpp>
    +<app/driver/status_io.cpp>
    +<lib/nrl_at_commands.cpp>
    +<lib/nrl_audio_bridge.cpp>
    +<lib/ble_config.cpp>
    +<lib/wifi_config_portal.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -fextended-identifiers
    -finput-charset=UTF-8
    -fexec-charset=UTF-8
    -Isrc/app
    -Isrc/app/driver
    -Isrc/lib

[env:gezipai]
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_GEZIPAI

[env:bh4tdv]
build_flags =
    ${env.build_flags}
    -DNRL_BOARD=NRL_BOARD_BH4TDV
