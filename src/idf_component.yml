dependencies:
  espressif/esp-sr:
    version: ">=2.0.0"
  # Audio codec HAL used directly by the ES7210/ES8311/ES8389 drivers on every
  # board. On S31 the korvo BSP also pulls it (^1.5.9); declare it here too so
  # gezipai/bh4tdv (no BSP) resolve it as well.
  espressif/esp_codec_dev:
    version: "^1.5.9"
  # Audio decoders (MP3/FLAC/AAC...) for the media player
  # (docs/architecture.md 3.3). The simple-decoder API also parses the
  # container/frame sync, so the player streams raw file bytes in and gets
  # PCM + format info out.
  espressif/esp_audio_codec:
    version: "^2.3.0"
  # JPEG decoder for embedded album art (media_metadata cover bytes ->
  # RGB565 for LVGL). Chosen over esp_lv_decoder because the latter's
  # component dependency on registry lvgl conflicts with our vendored LVGL.
  espressif/esp_new_jpeg:
    version: "^1.0.2"
  # FreeType for the vector CJK font engine on the S31 LCD (LV_USE_FREETYPE).
  # S31-only: the other boards keep the smaller bitmap-font-only build.
  espressif/freetype:
    version: "^2.13.3"
    rules:
      - if: "target == esp32s31"
  # USB flash drive playback: USB-OTG Host MSC -> FatFS at /usb
  # (docs/architecture.md 3.5). S31-only -- that's the board with the
  # USB-OTG host port.
  espressif/usb_host_msc:
    version: "^1.1.3"
    rules:
      - if: "target == esp32s31"
  # Addressable status LED on both ESP32-S31 development boards. Korvo pulls
  # this through its BSP; declare it directly for the Function CoreBoard too.
  espressif/led_strip:
    version: "^3.0.3"
    rules:
      - if: "target == esp32s31"
  # SMB2/3 client for playing audio from network shares (NAS / Windows
  # folder), mounted at /smb through the esp_vfs adapter in
  # services/smb_vfs.cpp. S31-only like the rest of the media stack.
  sahlberg/libsmb2:
    version: "^3.0.1"
    rules:
      - if: "target == esp32s31"
  # WebSocket client for the xiaozhi AI assistant link (services/ai_assistant).
  espressif/esp_websocket_client:
    version: "^1.5.0"
    rules:
      - if: "target == esp32s31"
  # esp-nimble-cpp: pure-IDF C++ wrapper around the NimBLE host stack used by
  # src/lib/ble_config.cpp. Requires CONFIG_BT_NIMBLE_ENABLED=y (set in
  # sdkconfig.defaults); Bluedroid must be off (mutually exclusive stacks).
  h2zero/esp-nimble-cpp:
    version: ">=2.2.0"
    rules:
      - if: "target != esp32s31"
  # LVGL (gezipai ST7789 LCD UI) is vendored at components/lvgl/ by
  # scripts/fetch_lvgl.py at build time. It is deliberately NOT listed here
  # because the IDF component manager would (a) overwrite it from the
  # registry and (b) prune the directory on reconfigure if its lock file
  # doesn't reference it.
  idf:
    version: ">=6.1.0"
