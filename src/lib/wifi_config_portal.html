<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:24px;background:#f3f6f9;color:#1f2937;}
    .card{max-width:760px;margin:0 auto;background:#fff;padding:24px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.08);}
    h1{margin-top:0;font-size:28px;}
    label{display:block;margin:14px 0 6px;font-weight:600;}
    input,select{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px;background:#fff;}
    button{margin-top:18px;padding:12px 18px;border:0;border-radius:10px;background:#0f766e;color:#fff;font-size:15px;font-weight:700;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .hint{color:#475569;font-size:14px;}
    .hint input[type=checkbox]{width:auto;margin-right:8px;}
    .mono{font-family:Consolas,monospace;}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .btn-small{margin-top:10px;padding:8px 12px;font-size:14px;}
    @media(max-width:640px){.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="card">
    <h1>{{HEADLINE}}</h1>
    <p class="hint">{{INTRO}}</p>
    <p class="hint">Hold the BOOT button for 5 seconds after startup to reset WiFi and server settings.</p>
    <p class="hint">AP IP: <span class="mono">{{AP_IP}}</span> | STA IP: <span class="mono">{{STA_IP}}</span></p>
    <form method="post" action="/save">
      <div class="grid">
        <div>
          <label>WiFi SSID</label>
          <input id="wifi-ssid-input" name="wifi_ssid" value="{{WIFI_SSID}}" autocomplete="off">
          <label>Nearby WiFi</label>
          <select id="wifi-ssid-select" onchange="applySelectedWifi()">
            <option value="">Select detected WiFi...</option>
            {{SSID_OPTIONS}}
          </select>
          <div class="row">
            <button class="btn-small" type="button" onclick="scanWifi()">Scan Nearby WiFi</button>
            <span class="hint" id="scan-status">Scan runs on demand to keep hotspot startup stable.</span>
          </div>
        </div>
        <div>
          <label>WiFi Password</label>
          <input name="wifi_password" value="{{WIFI_PASSWORD}}">
        </div>
        <div>
          <label>Server Host / IP</label>
          <input name="server_host" value="{{SERVER_HOST}}">
        </div>
        <div>
          <label>Server Port</label>
          <input name="server_port" value="{{SERVER_PORT}}">
        </div>
        <div>
          <label>Channel (0-7)</label>
          <input name="channel" value="{{CHANNEL}}">
        </div>
        <div>
          <label>Callsign</label>
          <input name="callsign" value="{{CALLSIGN}}">
        </div>
        <div>
          <label>Callsign SSID</label>
          <input name="callsign_ssid" value="{{CALLSIGN_SSID}}">
        </div>
        <div>
          <label>Mic Volume (0-255)</label>
          <input name="mic_volume" value="{{MIC_VOLUME}}">
        </div>
        <div>
          <label>Line Out Volume (0-255)</label>
          <input name="line_out_volume" value="{{LINE_OUT_VOLUME}}">
        </div>
        <div>
          <label>ES8311 HP Drive</label>
          <label class="hint"><input type="checkbox" name="hp_drive_enabled" value="1" {{HP_DRIVE_CHECKED}}> Enable headphone output drive (REG13 HPSW)</label>
        </div>
      </div>
      <button type="submit">{{SUBMIT_LABEL}}</button>
    </form>
    {{FOOTER}}
  </div>
  <script>
    function applySelectedWifi() {
      const select = document.getElementById('wifi-ssid-select');
      const input = document.getElementById('wifi-ssid-input');
      if (select.value) {
        input.value = select.value;
      }
    }

    async function scanWifi() {
      const status = document.getElementById('scan-status');
      const list = document.getElementById('wifi-ssid-select');
      status.textContent = 'Scanning...';
      try {
        const res = await fetch('/scan', {cache: 'no-store'});
        if (!res.ok) throw new Error('scan failed');
        const items = await res.json();
        list.innerHTML = '<option value="">Select detected WiFi...</option>';
        items.forEach((item) => {
          const opt = document.createElement('option');
          opt.value = item.ssid;
          opt.textContent = item.label;
          list.appendChild(opt);
        });
        status.textContent = items.length ? ('Found ' + items.length + ' WiFi networks') : 'No WiFi networks found';
      } catch (e) {
        status.textContent = 'Scan failed';
      }
    }
  </script>
</body>
</html>
