<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root{color-scheme:light;--bg:#eef2f5;--panel:#fff;--ink:#17202a;--muted:#5d6875;--line:#d8e0e8;--accent:#0f766e;--accent-2:#2457a6;--danger:#b42318;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:15px;}
    .shell{max-width:1040px;margin:0 auto;padding:20px;}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px;}
    h1{margin:0;font-size:26px;line-height:1.18;letter-spacing:0;}
    .sub{margin:6px 0 0;color:var(--muted);font-size:14px;}
    .language{margin-top:12px;}
    .language .lang-label{display:block;margin:0 0 6px;font-weight:700;font-size:13px;}
    .language .lang-radio{display:flex;gap:14px;flex-wrap:wrap;}
    .language .lang-radio label{display:inline-flex;align-items:center;margin:0;font-weight:400;font-size:14px;cursor:pointer;}
    input[type=radio]{width:auto;min-height:0;margin-right:6px;}
    .status{display:grid;grid-template-columns:repeat(2,minmax(150px,1fr));gap:8px;min-width:320px;}
    .status div{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
    .status span{display:block;color:var(--muted);font-size:12px;margin-bottom:3px;}
    .mono{font-family:Consolas,monospace;}
    .nav{display:flex;gap:8px;margin:0 0 14px;border-bottom:1px solid var(--line);}
    .nav a{display:inline-block;padding:10px 12px;text-decoration:none;color:var(--muted);border-bottom:3px solid transparent;font-weight:700;}
    .nav a.active{color:var(--accent);border-bottom-color:var(--accent);}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:14px;}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
    h2{margin:0;font-size:17px;letter-spacing:0;}
    .hint{color:var(--muted);font-size:13px;}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 16px;}
    label{display:block;margin:0 0 6px;font-weight:700;font-size:13px;}
    input,select{width:100%;min-height:40px;padding:9px 10px;border:1px solid #c5ced8;border-radius:6px;font-size:15px;background:#fff;color:var(--ink);}
    input[type=checkbox]{width:auto;min-height:0;margin-right:8px;}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .row select{flex:1;min-width:220px;width:auto;}
    .span-2{grid-column:1/-1;}
    .actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap;margin-top:16px;}
    button,.button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 14px;border:0;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;}
    .button.secondary,button.secondary{background:#e8edf3;color:#17202a;border:1px solid var(--line);}
    .btn-small{min-height:36px;padding:8px 11px;}
    .notice{border-left:4px solid var(--accent-2);padding:10px 12px;background:#edf4ff;color:#25364c;border-radius:4px;margin:0 0 14px;}
    .footer-links{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:10px;}
    .footer-links a{color:var(--accent-2);font-weight:700;text-decoration:none;}
    @media(max-width:760px){
      .shell{padding:14px;}
      .topbar{display:block;}
      .status{grid-template-columns:1fr;min-width:0;margin-top:12px;}
      .grid{grid-template-columns:1fr;}
      .span-2{grid-column:auto;}
      .actions{justify-content:stretch;}
      button,.button{width:100%;}
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div>
        <h1 data-i18n="{{HEADLINE_KEY}}">{{HEADLINE}}</h1>
        <p class="sub" data-i18n="{{INTRO_KEY}}">{{INTRO}}</p>
        <div class="language">
          <span class="lang-label" data-i18n="language">Language</span>
          <div id="language-select" class="lang-radio">
            <label><input type="radio" name="lang" value="en">English</label>
            <label><input type="radio" name="lang" value="zh">中文</label>
          </div>
        </div>
      </div>
      <div class="status">
        <div><span data-i18n="configAp">Config AP</span><strong class="mono">{{AP_IP}}</strong></div>
        <div><span data-i18n="stationIp">Station IP</span><strong class="mono">{{STA_IP}}</strong></div>
      </div>
    </div>

    <nav class="nav">
      <a class="{{NETWORK_ACTIVE}}" href="/" data-i18n="wifiConfig">WiFi Config</a>
      <a class="{{DEVICE_ACTIVE}}" href="/nrl" data-i18n="nrlConfig">NRL Config</a>
      <a href="/update" data-i18n="firmwareUpdate">Firmware Update</a>
    </nav>

    <p class="notice" data-i18n="bootNotice">Hold BOOT for 5 seconds after startup to reset WiFi and server settings.</p>
    <p class="sub"><span data-i18n="firmwareVersion">Firmware version</span> <span class="mono">{{VERSION}}</span></p>

    <form method="post" action="{{FORM_ACTION}}">
      {{FORM_SECTIONS}}
    </form>
    <div class="footer-links">{{FOOTER}}</div>
  </main>
  <script>
    const translations = {
      en: {
        language: 'Language',
        wifiConfig: 'WiFi Config',
        nrlConfig: 'NRL Config',
        firmwareUpdate: 'Firmware Update',
        configAp: 'Config AP',
        stationIp: 'Station IP',
        bootNotice: 'Hold BOOT for 5 seconds after startup to reset WiFi and server settings.',
        firmwareVersion: 'Firmware version',
        wifiHeadline: 'WiFi Config',
        wifiIntro: 'Set the WiFi network the device should join.',
        nrlHeadline: 'NRL Config',
        nrlIntro: 'Set server address, radio identity, and audio behavior.',
        wifiAppliedHeadline: 'WiFi Saved',
        wifiAppliedIntro: 'WiFi settings were saved.',
        wifiErrorHeadline: 'WiFi Save Failed',
        wifiErrorIntro: 'Check the WiFi name and password.',
        nrlAppliedHeadline: 'NRL Saved',
        nrlAppliedIntro: 'NRL, server, and audio settings were saved.',
        nrlErrorHeadline: 'NRL Save Failed',
        nrlErrorIntro: 'Check server address, port, channel, callsign, SSID, and audio values.',
        network: 'Network',
        scanIdle: 'Click Scan to find nearby WiFi networks.',
        wifiSsid: 'WiFi SSID',
        wifiPassword: 'WiFi Password',
        nearbyWifi: 'Nearby WiFi',
        selectWifi: 'Select detected WiFi...',
        scan: 'Scan',
        server: 'Server',
        serverHost: 'Server Host / IP',
        serverPort: 'Server Port',
        saveWifi: 'Save WiFi Config',
        radio: 'Radio',
        channel: 'Channel (0-7)',
        callsign: 'Callsign',
        callsignSsid: 'Callsign SSID',
        hpDrive: 'ES8311 HP Drive',
        hpDriveText: 'Enable headphone output drive (REG13 HPSW)',
        audio: 'Audio',
        micVolume: 'Mic Volume (0-255)',
        lineOutVolume: 'Line Out Volume (0-255)',
        saveNrl: 'Save NRL Config',
        scanning: 'Scanning...',
        foundPrefix: 'Found ',
        foundSuffix: ' WiFi networks',
        noneFound: 'No WiFi networks found',
        scanFailed: 'Scan failed'
      },
      zh: {
        language: '语言',
        wifiConfig: 'WiFi配置',
        nrlConfig: 'NRL配置',
        firmwareUpdate: '固件升级',
        configAp: '配置热点',
        stationIp: '联网地址',
        bootNotice: '开机后按住 BOOT 5 秒可重置 WiFi 和服务器设置。',
        firmwareVersion: '固件版本',
        wifiHeadline: 'WiFi配置',
        wifiIntro: '设置设备要连接的 WiFi 网络。',
        nrlHeadline: 'NRL配置',
        nrlIntro: '设置服务器地址、电台身份和音频参数。',
        wifiAppliedHeadline: 'WiFi已保存',
        wifiAppliedIntro: 'WiFi 设置已保存。',
        wifiErrorHeadline: 'WiFi保存失败',
        wifiErrorIntro: '请检查 WiFi 名称和密码。',
        nrlAppliedHeadline: 'NRL已保存',
        nrlAppliedIntro: 'NRL、服务器和音频设置已保存。',
        nrlErrorHeadline: 'NRL保存失败',
        nrlErrorIntro: '请检查服务器地址、端口、信道、呼号、SSID 和音频数值。',
        network: '网络',
        scanIdle: '点击扫描查找附近 WiFi。',
        wifiSsid: 'WiFi名称',
        wifiPassword: 'WiFi密码',
        nearbyWifi: '附近WiFi',
        selectWifi: '选择扫描到的 WiFi...',
        scan: '扫描',
        server: '服务器',
        serverHost: '服务器地址 / IP',
        serverPort: '服务器端口',
        saveWifi: '保存WiFi配置',
        radio: '电台',
        channel: '信道 (0-7)',
        callsign: '呼号',
        callsignSsid: '呼号SSID',
        hpDrive: 'ES8311耳机驱动',
        hpDriveText: '启用耳机输出驱动 (REG13 HPSW)',
        audio: '音频',
        micVolume: '麦克风音量 (0-255)',
        lineOutVolume: '线路输出音量 (0-255)',
        saveNrl: '保存NRL配置',
        scanning: '正在扫描...',
        foundPrefix: '找到 ',
        foundSuffix: ' 个 WiFi 网络',
        noneFound: '没有找到 WiFi 网络',
        scanFailed: '扫描失败'
      }
    };

    function currentLang() {
      const saved = localStorage.getItem('nrl_lang');
      if (saved === 'zh' || saved === 'en') return saved;
      return navigator.language && navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en';
    }

    function t(key) {
      const lang = currentLang();
      return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
    }

    function applyLanguage(lang) {
      localStorage.setItem('nrl_lang', lang);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('input[name="lang"]').forEach((r) => {
        r.checked = (r.value === lang);
      });
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      const firstOption = document.querySelector('#wifi-ssid-select option[value=""]');
      if (firstOption) firstOption.textContent = t('selectWifi');
    }

    function applySelectedWifi() {
      const select = document.getElementById('wifi-ssid-select');
      const input = document.getElementById('wifi-ssid-input');
      if (select.value) {
        input.value = select.value;
      }
    }

    async function scanWifi() {
      const status = document.getElementById('scan-status');
      const list = document.getElementById('wifi-ssid-select');
      status.textContent = t('scanning');
      try {
        const res = await fetch('/scan', {cache: 'no-store'});
        if (!res.ok) throw new Error('scan failed');
        const items = await res.json();
        list.innerHTML = '<option value="">' + t('selectWifi') + '</option>';
        items.forEach((item) => {
          const opt = document.createElement('option');
          opt.value = item.ssid;
          opt.textContent = item.label;
          list.appendChild(opt);
        });
        status.textContent = items.length ? (t('foundPrefix') + items.length + t('foundSuffix')) : t('noneFound');
      } catch (e) {
        status.textContent = t('scanFailed');
      }
    }

    applyLanguage(currentLang());
    document.querySelectorAll('input[name="lang"]').forEach((r) => {
      r.addEventListener('change', function () {
        if (this.checked) applyLanguage(this.value);
      });
    });
  </script>
</body>
</html>
