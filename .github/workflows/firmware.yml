name: Build firmware

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: PlatformIO app0_main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'part.csv') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Resolve firmware version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0+$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved firmware version: ${VERSION}"

      - name: Build firmware
        env:
          PLATFORMIO_BUILD_FLAGS: -DNRL_FIRMWARE_VERSION=\"${{ steps.ver.outputs.version }}\"
        run: pio run -e app0_main

      - name: Stage USB web flasher files
        run: python scripts/stage_web_flasher.py

      - name: Update web-flasher manifest version
        run: |
          python - <<'PY'
          import json, os, pathlib
          version = os.environ['VERSION']
          path = pathlib.Path('web-flasher/manifest.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['version'] = version
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          print(f"manifest.json version -> {version}")
          PY
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Bundle web-flasher
        run: |
          cd web-flasher
          zip -r "../web-flasher-${{ steps.ver.outputs.version }}.zip" .

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrl-esp32-firmware-${{ steps.ver.outputs.version }}
          if-no-files-found: error
          path: |
            .pio/build/app0_main/firmware.bin
            .pio/build/app0_main/partitions.bin
            .pio/build/app0_main/bootloader.bin
            web-flasher/index.html
            web-flasher/manifest.json
            web-flasher/firmware/*.bin
            web-flasher-${{ steps.ver.outputs.version }}.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            .pio/build/app0_main/firmware.bin
            .pio/build/app0_main/partitions.bin
            .pio/build/app0_main/bootloader.bin
            web-flasher-${{ steps.ver.outputs.version }}.zip
