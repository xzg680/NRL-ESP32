name: Build firmware

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: PlatformIO app0_main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'part.csv') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e app0_main

      - name: Stage USB web flasher files
        run: python scripts/stage_web_flasher.py

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrl-esp32-firmware-0.0.1-${{ github.sha }}
          if-no-files-found: error
          path: |
            .pio/build/app0_main/firmware.bin
            .pio/build/app0_main/partitions.bin
            .pio/build/app0_main/bootloader.bin
            web-flasher/index.html
            web-flasher/manifest.json
            web-flasher/firmware/*.bin
