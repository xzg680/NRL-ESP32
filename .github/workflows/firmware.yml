name: Build firmware

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # All boards build natively with ESP-IDF (no PlatformIO). The repo root is a
  # native IDF project (CMakeLists.txt); pass -DNRL_NATIVE_BUILD=1 so it
  # registers src/ as the (whole-archived) main component and applies the board
  # macros that platformio.ini used to supply. Board config that differs beyond
  # compile macros (partition table) lives in per-board sdkconfig defaults.
  #
  # IDF version: there is no v6.2 / release-v6.2 Docker tag yet, so track the
  # rolling master image (espressif/idf:latest, which is the 6.2 line and has
  # esp32s31). Pin to v6.2 once Espressif publishes that tag.
  build:
    name: ESP-IDF native (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: gezipai
            target: esp32s3
            board_macro: NRL_BOARD_GEZIPAI
            sdkconfig: sdkconfig.gezipai.defaults
            lvgl: "true"
            extra_args: ""
          - board: bh4tdv
            target: esp32s3
            board_macro: NRL_BOARD_BH4TDV
            sdkconfig: sdkconfig.bh4tdv.defaults
            lvgl: "false"
            extra_args: ""
          - board: s31_korvo
            target: esp32s31
            board_macro: NRL_BOARD_S31_KORVO
            sdkconfig: sdkconfig.s31_korvo.defaults
            lvgl: "true"
            extra_args: "-DNRL_EXTRA_COMPONENT_DIRS=vendor/esp32_s31_korvo"
          - board: s31_function_coreboard
            target: esp32s31
            board_macro: NRL_BOARD_S31_FUNCTION_COREBOARD
            sdkconfig: sdkconfig.s31_function_coreboard.defaults
            lvgl: "false"
            extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LVGL
        if: matrix.lvgl == 'true'
        uses: actions/cache@v4
        with:
          path: components/lvgl
          key: ${{ runner.os }}-lvgl-${{ hashFiles('scripts/fetch_lvgl.py') }}

      - name: Fetch LVGL
        if: matrix.lvgl == 'true'
        run: python3 scripts/fetch_lvgl.py

      - name: Resolve firmware version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0+$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved firmware version: ${VERSION}"

      - name: Build ${{ matrix.board }} (ESP-IDF)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: latest
          target: ${{ matrix.target }}
          # `rm -f sdkconfig` first so our SDKCONFIG_DEFAULTS is applied fresh
          # (defaults are only read when sdkconfig does not already exist; the
          # action may have generated one during set-target).
          command: >-
            rm -f sdkconfig &&
            idf.py -DIDF_TARGET=${{ matrix.target }}
            -DNRL_NATIVE_BUILD=1
            -DNRL_BOARD_ID=${{ matrix.board_macro }}
            -DSDKCONFIG_DEFAULTS="${{ matrix.sdkconfig }}"
            ${{ matrix.extra_args }}
            -DNRL_FW_VERSION=${{ steps.ver.outputs.version }}
            build

      - name: Collect firmware binaries
        # The full flashable set (see build/flasher_args.json for offsets):
        # bootloader, partition-table, ota_data_initial, app, and the esp-sr
        # models (srmodels). All five are needed for a from-scratch flash.
        run: |
          mkdir -p dist
          cp build/nrl-esp32.bin                       "dist/firmware-${{ matrix.board }}.bin"
          cp build/partition_table/partition-table.bin "dist/partitions-${{ matrix.board }}.bin"
          cp build/bootloader/bootloader.bin           "dist/bootloader-${{ matrix.board }}.bin"
          cp build/ota_data_initial.bin                "dist/ota_data-${{ matrix.board }}.bin"
          cp build/srmodels/srmodels.bin               "dist/srmodels-${{ matrix.board }}.bin"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrl-esp32-firmware-${{ matrix.board }}-${{ steps.ver.outputs.version }}
          if-no-files-found: error
          path: dist/*-${{ matrix.board }}.bin

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*-${{ matrix.board }}.bin

  # USB browser flasher (esp-web-tools) for the two ESP32-S3 boards only:
  # esptool-js has no ESP32-S31 support, so s31_korvo is serial-only. Builds both
  # S3 boards into separate build/<board>/ dirs, then scripts/stage_web_flasher.py
  # reads each build/<board>/flasher_args.json to copy the images + write the
  # esp-web-tools manifests.
  web-flasher:
    name: Bundle web-flasher (S3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LVGL
        uses: actions/cache@v4
        with:
          path: components/lvgl
          key: ${{ runner.os }}-lvgl-${{ hashFiles('scripts/fetch_lvgl.py') }}

      - name: Fetch LVGL
        run: python3 scripts/fetch_lvgl.py

      - name: Resolve firmware version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0+$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build gezipai + bh4tdv (ESP-IDF)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: latest
          target: esp32s3
          command: >-
            idf.py -B build/gezipai -DIDF_TARGET=esp32s3 -DNRL_NATIVE_BUILD=1
            -DNRL_BOARD_ID=NRL_BOARD_GEZIPAI -DSDKCONFIG=build/gezipai/sdkconfig
            -DSDKCONFIG_DEFAULTS=sdkconfig.gezipai.defaults
            -DNRL_FW_VERSION=${{ steps.ver.outputs.version }} build &&
            idf.py -B build/bh4tdv -DIDF_TARGET=esp32s3 -DNRL_NATIVE_BUILD=1
            -DNRL_BOARD_ID=NRL_BOARD_BH4TDV -DSDKCONFIG=build/bh4tdv/sdkconfig
            -DSDKCONFIG_DEFAULTS=sdkconfig.bh4tdv.defaults
            -DNRL_FW_VERSION=${{ steps.ver.outputs.version }} build

      - name: Stage web-flasher
        run: python3 scripts/stage_web_flasher.py --version "${{ steps.ver.outputs.version }}"

      - name: Bundle web-flasher zip
        run: |
          cd web-flasher
          zip -r "../web-flasher-${{ steps.ver.outputs.version }}.zip" .

      - name: Upload web-flasher artifact
        uses: actions/upload-artifact@v4
        with:
          name: nrl-esp32-web-flasher-${{ steps.ver.outputs.version }}
          if-no-files-found: error
          path: |
            web-flasher-${{ steps.ver.outputs.version }}.zip
            web-flasher/index.html
            web-flasher/manifest-gezipai.json
            web-flasher/manifest-bh4tdv.json
            web-flasher/firmware/gezipai/*.bin
            web-flasher/firmware/bh4tdv/*.bin

      - name: Publish web-flasher to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: web-flasher-${{ steps.ver.outputs.version }}.zip
