server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep all dynamic OTA endpoints separate from the static frontend. The
    # official nginx image renders API_UPSTREAM at container startup; its
    # trailing slash removes /nrlota/api/ before forwarding to Go.
    location ^~ /nrlota/api/ {
        proxy_pass ${API_UPSTREAM}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
